services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-docflow}
      - POSTGRES_USER=${POSTGRES_USER:-docflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-docflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docflow} -d ${POSTGRES_DB:-docflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-9000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-docflow}:${POSTGRES_PASSWORD:-docflow}@db:5432/${POSTGRES_DB:-docflow}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GOOGLE_OAUTH_STATE_SECRET=${GOOGLE_OAUTH_STATE_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  app:
    build:
      context: .
      target: dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-docflow}:${POSTGRES_PASSWORD:-docflow}@db:5432/${POSTGRES_DB:-docflow}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:9000}
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev"

  app-prod:
    profiles: ["prod"]
    build:
      context: .
      target: prod
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-docflow}:${POSTGRES_PASSWORD:-docflow}@db:5432/${POSTGRES_DB:-docflow}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}

volumes:
  node_modules:
  postgres_data:
